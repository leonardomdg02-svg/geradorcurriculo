<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gerador de Currículos em PDF profissional, crie e baixe seu currículo grátis.">
    <meta property="og:title" content="Gerador de Currículos PDF">
    <meta property="og:description" content="Crie e baixe seu currículo profissional grátis e sem complicação.">
    <meta property="og:type" content="website">
    <title>Gerador de Currículos PDF</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js" defer></script>
    <script src="app.js?v=2" defer></script>
</head>
<body>
    <header class="app-header">
        <h1>Gerador de Currículos</h1>
        <button id="theme-toggle" aria-label="Alternar Tema">🌙 Tema</button>
    </header>

    <div id="restore-banner" class="hidden">
        <p>Encontramos um rascunho salvo. Deseja continuar de onde parou?</p>
        <button id="btn-restore" class="btn-success">Restaurar</button>
        <button id="btn-clear-draft" class="btn-danger">Começar do Zero</button>
    </div>

    <main class="container">
        <!-- Lado esquerdo: Formulário -->
        <section class="form-section">
            <div class="progress-bar">
                <span class="step-indicator active">1</span>
                <span class="step-indicator">2</span>
                <span class="step-indicator">3</span>
                <span class="step-indicator">4</span>
                <span class="step-indicator">5</span>
            </div>

            <form id="cv-form">
                <!-- Passo 1 -->
                <div class="step active" id="step-1">
                    <h2>Dados Pessoais</h2>
                    <div class="input-group">
                        <label for="nome">Nome Completo*</label>
                        <input type="text" id="nome" required minlength="3">
                        <span class="error-msg"></span>
                    </div>
                    <div class="input-group">
                        <label for="email">Email*</label>
                        <input type="email" id="email" required>
                        <span class="error-msg"></span>
                    </div>
                    <div class="input-group">
                        <label for="telefone">Telefone*</label>
                        <input type="text" id="telefone" placeholder="(99) 99999-9999" required>
                        <span class="error-msg"></span>
                    </div>
                    <div class="input-group">
                        <label for="cidade">Cidade/Estado*</label>
                        <input type="text" id="cidade" required minlength="3">
                        <span class="error-msg"></span>
                    </div>
                    <div class="input-group">
                        <label for="linkedin">LinkedIn/Portfólio <span class="tooltip" title="Ex: https://linkedin.com">?</span></label>
                        <input type="url" id="linkedin">
                        <span class="error-msg"></span>
                    </div>
                    <div class="input-group">
                        <label for="foto">Foto (JPG/PNG) - <small>Opcional</small></label>
                        <input type="file" id="foto" accept="image/jpeg, image/png">
                        <img id="foto-preview" class="hidden circular-preview" alt="Preview">
                    </div>
                </div>

                <!-- Passo 2 -->
                <div class="step hidden" id="step-2">
                    <h2>Objetivo Profissional</h2>
                    <div class="input-group">
                        <label for="objetivo">Objetivo*</label>
                        <textarea id="objetivo" required maxlength="500" placeholder="Ex: Profissional com X anos de experiência em..."></textarea>
                        <div class="char-counter"><span id="obj-count">0</span>/500</div>
                        <span class="error-msg"></span>
                    </div>
                </div>

                <!-- Passo 3 -->
                <div class="step hidden" id="step-3">
                    <h2>Formação Acadêmica</h2>
                    <div id="formacao-container"></div>
                    <button type="button" id="add-formacao" class="btn-outline">+ Adicionar Formação</button>
                    <span id="formacao-error" class="error-msg"></span>
                </div>

                <!-- Passo 4 -->
                <div class="step hidden" id="step-4">
                    <h2>Experiência Profissional</h2>
                    <div id="experiencia-container"></div>
                    <button type="button" id="add-experiencia" class="btn-outline">+ Adicionar Experiência</button>
                    <span id="experiencia-error" class="error-msg"></span>
                </div>

                <!-- Passo 5 -->
                <div class="step hidden" id="step-5">
                    <h2>Habilidades e Templates</h2>
                    <div class="input-group">
                        <label for="habilidade-input">Habilidades* (Mínimo 3)</label>
                        <div class="chip-input-container">
                            <input type="text" id="habilidade-input" placeholder="Digite e aperte Enter">
                            <button type="button" id="add-habilidade" class="btn-secondary">Add</button>
                        </div>
                        <div id="habilidades-container" class="chips-wrapper"></div>
                        <span id="habilidade-error" class="error-msg"></span>
                    </div>

                    <h3>Templates</h3>
                    <div class="template-selector">
                        <div class="template-card active" data-template="classico">Clássico</div>
                        <div class="template-card" data-template="moderno">Moderno</div>
                        <div class="template-card" data-template="criativo">Criativo</div>
                    </div>
                    
                    <button type="button" id="btn-generate-pdf" class="btn-primary" style="margin-top:20px;">
                        <span class="spinner hidden" id="pdf-spinner"></span> Baixar PDF
                    </button>
                </div>

                <div class="form-actions">
                    <button type="button" id="btn-prev" class="hidden">Anterior</button>
                    <button type="button" id="btn-save-draft" class="btn-outline">Salvar Rascunho</button>
                    <button type="button" id="btn-next">Próximo</button>
                </div>
            </form>
        </section>

        <!-- Preview Modal/Side -->
        <button id="btn-open-preview" class="mobile-only btn-primary">Ver Prévia</button>
        <section class="preview-section hidden-mobile" id="preview-modal">
            <button id="btn-close-preview" class="mobile-only btn-outline">Fechar</button>
            <div id="live-preview" class="cv-preview template-classico">
                <!-- Injetado dinamicamente -->
            </div>
        </section>
    </main>

    <div id="toast" class="hidden"></div>
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                // Não preenche se já houver dados no rascunho
                if(document.getElementById('nome').value) return;

                document.getElementById('nome').value = 'Ana Souza Oliveira';
                document.getElementById('email').value = 'ana.souza@email.com';
                document.getElementById('telefone').value = '11912345678';
                document.getElementById('cidade').value = 'Campinas, SP';
                document.getElementById('linkedin').value = 'https://linkedin.com/in/anasouza';
                document.getElementById('objetivo').value = 'Engenheira de Software apaixonada por resolver problemas complexos com código limpo. Mais de 5 anos de experiência trabalhando com equipes de alta performance e entregando projetos escaláveis.';
                
                if(typeof createFormacao === 'function') {
                    createFormacao();
                    const fInputs = document.querySelectorAll('#formacao-container .dynamic-block input');
                    if(fInputs.length > 1) { 
                        fInputs[0].value = 'Engenharia da Computação'; 
                        fInputs[1].value = 'Universidade Estadual'; 
                    }
                }
                
                if(typeof createExperiencia === 'function') {
                    createExperiencia();
                    const eInputs = document.querySelectorAll('#experiencia-container .dynamic-block input');
                    if(eInputs.length > 1) { 
                        eInputs[0].value = 'Inovação Tech LTDA'; 
                        eInputs[1].value = 'Tech Lead / Arquiteta'; 
                    }
                }
                
                if(typeof addHabilidade === 'function') {
                    ['JavaScript', 'Node.js', 'React', 'CSS3', 'Arquitetura de Software'].forEach(h => {
                        const input = document.getElementById('habilidade-input');
                        if(input) {
                            input.value = h;
                            addHabilidade();
                        }
                    });
                }
                
                if(typeof updatePreview === 'function') updatePreview();
            }, 300);
        });
    </script>
</body>
</html>
